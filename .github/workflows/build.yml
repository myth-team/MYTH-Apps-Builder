name: Flutter Build & Deploy

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build target (web or apk)'
        required: true
        default: 'web'
      project_name:
        description: 'Flutter project name (snake_case)'
        required: false
        default: 'app'
      package_id:
        description: 'Unique package identifier for Android (e.g. project_abc123)'
        required: false
        default: 'app'

# Sequential deployment to gh-pages prevents Git lock errors (cannot lock ref)
concurrency:
  group: pages-deploy-${{ github.ref_name }} # Narrower group per-branch for parallel builds
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        if: github.event.inputs.build_type == 'apk'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Gradle
        if: github.event.inputs.build_type == 'apk' || github.event_name == 'push'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Build Objects (.dart_tool)
        if: github.event.inputs.build_type == 'web'
        uses: actions/cache@v4
        with:
          path: .dart_tool
          key: ${{ runner.os }}-dart-tool-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-dart-tool-${{ github.ref_name }}-
            ${{ runner.os }}-dart-tool-

      # Flutter SDK: shared across ALL branches via a stable global key.
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.2"
          channel: "stable"
          cache: true
          pub-cache: false
          cache-key: "myth-flutter-sdk-global-v1"

      # Push triggers GitHub built-in Pages CDN deploy (extra short workflow) — normal for gh-pages hosting.

      - name: Initialize Project
        run: |
          TARGET="${{ github.event.inputs.build_type }}"
          PROJECT_NAME="${{ github.event.inputs.project_name }}"
          PACKAGE_ID="${{ github.event.inputs.package_id }}"
          if [ -z "$TARGET" ]; then TARGET="web"; fi
          if [ -z "$PROJECT_NAME" ]; then PROJECT_NAME="app"; fi
          if [ -z "$PACKAGE_ID" ]; then PACKAGE_ID="app"; fi
          mkdir -p .backup
          cp -r lib .backup/ || true
          cp pubspec.yaml .backup/ || true
          
          # Only run flutter create if platform scaffold is missing (saves ~15s on repeat builds)
          if [ "$TARGET" == "apk" ]; then
            if [ ! -d "android" ]; then
              flutter create . --platforms=android --project-name="$PROJECT_NAME" --org=com.myth --overwrite --no-pub
            fi
          else
            if [ ! -d "web" ]; then
              flutter create . --platforms=web --project-name=app --overwrite --no-pub
            fi
          fi
          
          cp -r .backup/lib . || true
          cp .backup/pubspec.yaml . || true
          
          mkdir -p assets images fonts
          # Try offline first (instant on cache hit), fall back to online
          flutter pub get --offline 2>/dev/null || flutter pub get

      - name: Optimize Android Build (APK)
        if: github.event.inputs.build_type == 'apk'
        run: |
          if [ -f android/gradle.properties ]; then
            grep -q '^kotlin.jvm.target.validation.mode=' android/gradle.properties || echo 'kotlin.jvm.target.validation.mode=warning' >> android/gradle.properties
            echo 'org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:+HeapDumpOnOutOfMemoryError' >> android/gradle.properties
            echo 'org.gradle.parallel=true' >> android/gradle.properties
            echo 'org.gradle.caching=true' >> android/gradle.properties
          fi
      - name: Analyze Dart (catch errors early)
        if: github.event.inputs.build_type == 'web'
        run: dart analyze --no-fatal-warnings lib/

      - name: Heal web/index.html
        if: github.event.inputs.build_type == 'web'
        run: |
          if [ -f web/index.html ]; then
            # If <base href= is missing, inject it after <head>
            if ! grep -q "<base href=" web/index.html; then
              sed -i 's|<head>|<head><base href="$FLUTTER_BASE_HREF">|' web/index.html
            fi
            # Ensure any existing base href uses the required placeholder
            sed -i 's|<base href="[^"]*">|<base href="$FLUTTER_BASE_HREF">|g' web/index.html
          fi

      - name: Build Web
        if: github.event.inputs.build_type == 'web'
        env:
          BUST: ${{ github.run_id }}-${{ github.run_number }}
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${{ github.ref_name }}"
          # Modern Flutter (3.29+) removed --web-renderer flag; it defaults to optimized CanvasKit/Skwasm.
          flutter build web --release --no-tree-shake-icons -O 4 --base-href /$REPO_NAME/previews/$BRANCH/
          
          # Inject capture scripts
          echo "" | base64 -d > capture_script.html
          echo "" | base64 -d > myth-patch-preview-index.cjs
          node myth-patch-preview-index.cjs
          cp build/web/index.html build/web/404.html

      - name: Clean and Prune Build
        if: github.event.inputs.build_type == 'web'
        run: |
          # Remove source maps and debug info
          find build/web -name "*.js.map" -delete
          find build/web -name "*.dart.js.map" -delete
          # Remove any leftover temp files
          rm -f build/web/myth-patch-preview-index.cjs capture_script.html
          
      - name: Build Size Diagnostic
        if: github.event.inputs.build_type == 'web'
        run: |
          echo "--- 20 Largest Files in build/web ---"
          find build/web -type f -exec du -h {} + | sort -hr | head -n 20
          echo "Total size:"
          du -sh build/web
          
      - name: Deploy Preview 🚀
        if: success() && github.event.inputs.build_type == 'web'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
          target-folder: previews/${{ github.ref_name }}
          clean: false
          force: true
          single-commit: false

      - name: Build APK
        id: build_apk
        if: github.event.inputs.build_type == 'apk'
        run: flutter build apk --release --target-platform android-arm64

      - name: Upload Artifacts
        if: success() && github.event.inputs.build_type == 'apk' && steps.build_apk.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          if-no-files-found: ignore
          path: |
            build/app/outputs/flutter-apk/app-release.apk