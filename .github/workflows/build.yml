name: Flutter Build & Deploy

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build target (web or apk)'
        required: true
        default: 'web'
      project_name:
        description: 'Flutter project name (snake_case)'
        required: false
        default: 'app'
      package_id:
        description: 'Unique package identifier for Android (e.g. project_abc123)'
        required: false
        default: 'app'
      is_warmup:
        description: 'If true, waits up to 60s for a new commit before compiling'
        required: false
        default: 'false'

# Sequential deployment to gh-pages prevents Git lock errors (cannot lock ref)
concurrency:
  group: pages-deploy-${{ github.ref_name }} # Narrower group per-branch for parallel builds
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        if: github.event.inputs.build_type == 'apk'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Gradle
        if: github.event.inputs.build_type == 'apk' || github.event_name == 'push'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Web Build Output
        if: github.event.inputs.build_type == 'web'
        uses: actions/cache@v4
        with:
          path: |
            build/web
            .dart_tool
          key: ${{ runner.os }}-web-build-${{ github.ref_name }}-${{ github.run_number }}
          restore-keys: |
            ${{ runner.os }}-web-build-${{ github.ref_name }}-
            ${{ runner.os }}-web-build-

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: "stable"
          cache: true
          cache-key: "flutter-${{ runner.os }}-3.27.4"

      - name: Initialize Project
        run: |
          TARGET="${{ github.event.inputs.build_type }}"
          PROJECT_NAME="${{ github.event.inputs.project_name }}"
          PACKAGE_ID="${{ github.event.inputs.package_id }}"
          if [ -z "$TARGET" ]; then TARGET="web"; fi
          if [ -z "$PROJECT_NAME" ]; then PROJECT_NAME="app"; fi
          if [ -z "$PACKAGE_ID" ]; then PACKAGE_ID="app"; fi
          mkdir -p .backup
          cp -r lib .backup/ || true
          cp pubspec.yaml .backup/ || true
          
          # Preview (web): scaffold web only — no Android project or APK work on chat/dashboard builds.
          # Download page dispatches build_type=apk → android only + flutter build apk.
          if [ "$TARGET" == "apk" ]; then
            flutter create . --platforms=android --project-name="$PROJECT_NAME" --org=com.myth --overwrite
          else
            flutter create . --platforms=web --project-name=app --overwrite
          fi
          
          cp -r .backup/lib . || true
          cp .backup/pubspec.yaml . || true
          
          mkdir -p assets images fonts
          flutter pub get

      - name: Wait for AI Generation (Warm-up Sync)
        if: github.event.inputs.is_warmup == 'true'
        run: |
          echo "Warmup mode active. Waiting up to 60s for AI to finish generating code..."
          INITIAL_COMMIT=$(git rev-parse HEAD)
          for i in {1..30}; do
            git fetch origin ${{ github.ref_name }}
            REMOTE_COMMIT=$(git rev-parse origin/${{ github.ref_name }})
            if [ "$INITIAL_COMMIT" != "$REMOTE_COMMIT" ]; then
              echo "New AI code detected! Pulling..."
              git reset --hard $REMOTE_COMMIT
              flutter pub get
              break
            fi
            sleep 2
          done

      - name: Optimize Android Build (APK)
        if: github.event.inputs.build_type == 'apk'
        run: |
          if [ -f android/gradle.properties ]; then
            grep -q '^kotlin.jvm.target.validation.mode=' android/gradle.properties || echo 'kotlin.jvm.target.validation.mode=warning' >> android/gradle.properties
            echo 'org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:+HeapDumpOnOutOfMemoryError' >> android/gradle.properties
            echo 'org.gradle.parallel=true' >> android/gradle.properties
            echo 'org.gradle.caching=true' >> android/gradle.properties
          fi

      - name: Build Web (preview for GitHub Pages)
        if: github.event.inputs.build_type == 'web'
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          BUILD_ID="${{ github.run_id }}-${{ github.run_number }}"
          # Disable Flutter PWA service worker for previews to avoid stale cached bundles after rebuilds.
          flutter build web --release --pwa-strategy=none --no-tree-shake-icons --base-href "/$REPO_NAME/previews/${{ github.ref_name }}/"
          echo "" | base64 -d > capture_script.html
          cat > patch_preview_cache.js <<'NODE'
          const fs = require('fs');
          const buildId = process.env.BUILD_ID || String(Date.now());
          const indexPath = 'build/web/index.html';
          const bootstrapPath = 'build/web/flutter_bootstrap.js';
          const v = encodeURIComponent(buildId);

          let html = fs.readFileSync(indexPath, 'utf8');
          const script = fs.readFileSync('capture_script.html', 'utf8');
          html = html.replace('</body>', script + '</body>');
          html = html.replace(
            '<head>',
            '<head><meta name="myth-build-id" content="' +
              buildId +
              '"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">'
          );
          html = html.replace(/flutter_bootstrap.js(?[^"']*)?/g, 'flutter_bootstrap.js?v=' + v);
          fs.writeFileSync(indexPath, html);

          if (fs.existsSync(bootstrapPath)) {
            let bs = fs.readFileSync(bootstrapPath, 'utf8');
            bs = bs.replace(/main.dart.js(?[^"']*)?/g, 'main.dart.js?v=' + v);
            bs = bs.replace(/flutter.js(?[^"']*)?/g, 'flutter.js?v=' + v);
            bs = bs.replace(/AssetManifest.bin.json(?[^"']*)?/g, 'AssetManifest.bin.json?v=' + v);
            bs = bs.replace(/FontManifest.json(?[^"']*)?/g, 'FontManifest.json?v=' + v);
            fs.writeFileSync(bootstrapPath, bs);
          }
          NODE
          node patch_preview_cache.js
          rm -f patch_preview_cache.js
          # GitHub Pages: avoid 404 on deep links / refresh (Flutter web router)
          cp build/web/index.html build/web/404.html

      - name: Stage site for Pages deploy
        if: github.event.inputs.build_type == 'web'
        run: |
          rm -rf myth-pages-bundle
          mkdir -p myth-pages-bundle
          cp -a build/web/. myth-pages-bundle/
          touch myth-pages-bundle/.nojekyll
          rm -f myth-pages-bundle/.gitignore

      - name: Deploy Preview 🚀
        if: success() && github.event.inputs.build_type == 'web'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: myth-pages-bundle
          branch: gh-pages
          target-folder: previews/${{ github.ref_name }}
          clean: false
          force: false
          
      # Root .nojekyll disables Jekyll for the whole site; without it Flutter assets under previews/ can break or 404.
      - name: Ensure gh-pages root (index + .nojekyll)
        if: success() && github.event.inputs.build_type == 'web'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git clone --depth 1 --branch gh-pages https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git gh-pages-root
          cd gh-pages-root
          touch .nojekyll
          if [ ! -f "index.html" ]; then
            echo "<!DOCTYPE html><html><body>MYTH Build System — previews live under <code>previews/</code></body></html>" > index.html
          fi
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "Pages root: .nojekyll + index (MYTH)"
            git push origin gh-pages
          fi

      # Point GitHub Pages at gh-pages (legacy)
      - name: Point GitHub Pages at gh-pages
        if: success() && github.event.inputs.build_type == 'web'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const payload = {
              build_type: 'legacy',
              source: { branch: 'gh-pages', path: '/' }
            };
            try {
              await github.request('PUT /repos/{owner}/{repo}/pages', {
                owner, repo, ...payload
              });
              core.info('GitHub Pages: legacy + gh-pages (PUT 204)');
            } catch (e) {
              const st = e.status || e.response?.status;
              if (st === 404) {
                try {
                  await github.request('POST /repos/{owner}/{repo}/pages', {
                    owner, repo, ...payload
                  });
                  core.info('GitHub Pages: legacy + gh-pages (POST 201)');
                } catch (e2) {
                  core.warning('Pages POST failed: ' + (e2.message || String(e2)));
                }
              } else {
                core.warning('Pages PUT failed: ' + (e.message || String(e)) + ' (HTTP ' + st + ')');
              }
            }

      - name: Build APK
        id: build_apk
        if: github.event.inputs.build_type == 'apk'
        run: flutter build apk --release --target-platform android-arm64

      - name: Upload Artifacts
        if: success() && github.event.inputs.build_type == 'apk' && steps.build_apk.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          if-no-files-found: ignore
          path: |
            build/app/outputs/flutter-apk/app-release.apk