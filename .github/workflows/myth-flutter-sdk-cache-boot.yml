name: MYTH Flutter SDK cache seed

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: flutter-sdk-cache-seed
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Install Flutter (populate Actions cache for all MYTH branches)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.2"
          channel: "stable"
          cache: true
          pub-cache: false
          cache-key: "myth-flutter-sdk-global-v1"
      - run: flutter --version && dart --version
